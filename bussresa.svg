    <!-- Bilstol -->
    <rect x="30" y="15" width="40" height="15" rx="5" fill="#e0e0e0" />
    <rect x="20" y="32" width="60" height="58" rx="10" fill="#f0f0f0" />
    
    <!-- Person -->
    <path d="M25 90 Q25 55 50 55 Q75 55 75 90 Z" fill="#333" />
    <circle cx="50" cy="38" r="12" fill="#333" />
    
    <!-- Bilbälte -->

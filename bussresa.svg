    <circle cx="50" cy="50" r="35" fill="#FFD700" stroke="#DAA520" stroke-width="2" />
    <circle cx="50" cy="50" r="28" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="2,2" />
    <text x="50" y="58" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#B8860B" text-anchor="middle">kr</text>
  </g>

  <!-- 2. SNEDSTRECK / (Mitten - Centrerat på x=150) -->
